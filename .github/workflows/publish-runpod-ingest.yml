name: Publish Runpod ingest image

on:
  push:
    branches:
      - main
      - master
    paths:
      - "runpod/ingest/**"
      - ".github/workflows/publish-runpod-ingest.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: runpod/ingest
          file: runpod/ingest/Dockerfile
          push: true
          provenance: false
          sbom: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/projektmelody-runpod-ingest:latest
            ghcr.io/${{ github.repository_owner }}/projektmelody-runpod-ingest:${{ github.sha }}
