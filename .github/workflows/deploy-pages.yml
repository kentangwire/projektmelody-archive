# Deploy static site + Cloudflare Functions to Pages.
#
# Required repo secrets:
#   CLOUDFLARE_API_TOKEN — Pages edit permission
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account id
#
# Optional (refreshes Pages function secret on each deploy):
#   DATABASE_URL — Neon connection string for /api/videos/* functions

name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "runpod/**"
      - "docs/**"
      - "*.md"
  workflow_dispatch: {}

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run sync:public

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=projektmelody --branch=main
